name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install poetry
        run: pipx install poetry
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "poetry"
      - name: Install dependencies
        run: poetry install
      - name: Run Ruff
        run: poetry run ruff check src tests
      - name: Run Mypy
        run: poetry run mypy src tests

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    services:
      altertable:
        image: ghcr.io/altertable-ai/altertable-mock:latest
        ports:
          - 15001:15001
        env:
          ALTERTABLE_MOCK_API_KEYS: test_pk_abc123
        options: >-
          --health-cmd "exit 0"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 3
          --health-start-period 10s

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run pytest
